# Render Blueprint: game server (apps/server). Web lives on Vercel.
# DATABASE_URL and WEB_ORIGINS are set in the Render dashboard (sync: false).
services:
  - type: web
    name: bridou-server
    runtime: node
    plan: free
    branch: main
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @bridou/server build
    startCommand: node apps/server/dist/main.js
    envVars:
      - key: FIREBASE_PROJECT_ID
        value: bridou-online
      - key: DATABASE_URL
        sync: false
      - key: WEB_ORIGINS
        sync: false
